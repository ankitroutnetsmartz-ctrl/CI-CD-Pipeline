name: Production Verified Build & Deploy
on:
  push:
    branches:
      - main

jobs:
  deploy_production:
    name: Deploy to Production
    runs-on: self-hosted
    environment: production

    env:
      DEPLOY_DIR: ${{ secrets.PROD_DEPLOY_DIR }}
      BACKUP_DIR: ${{ secrets.PROD_BACKUP_DIR }}
      CONTAINER_NAME: ${{ secrets.PROD_CONTAINER_NAME }}

    steps:
      - name: Checkout Repository Directly to Runner
        uses: actions/checkout@v4

      - name: Setup SSH via .pem Key Securely
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_PEM_KEY }}" > ~/.ssh/prod.pem
          chmod 600 ~/.ssh/prod.pem
          ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts || true
          echo -e "Host ${{ secrets.PROD_HOST }}\n\tStrictHostKeyChecking no\n\tUserKnownHostsFile /dev/null\n" >> ~/.ssh/config

      - name: Backup Production (Keep Last 3 Only)
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/prod.pem ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'EOF'
            set -e
            sudo mkdir -p "${{ env.BACKUP_DIR }}"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            
            if [ -d "${{ env.DEPLOY_DIR }}" ] && [ "$(ls -A ${{ env.DEPLOY_DIR }} 2>/dev/null)" ]; then
                sudo tar --exclude="${{ env.BACKUP_DIR }}" -czf "${{ env.BACKUP_DIR }}/backup_${TIMESTAMP}.tar.gz" -C "${{ env.DEPLOY_DIR }}" .
                echo "Backup saved successfully."
                sudo ls -1t "${{ env.BACKUP_DIR }}"/backup_*.tar.gz | tail -n +4 | xargs -r sudo rm -f
            else
                echo "Deploy folder empty. Skipping backup sequence."
            fi
          EOF

      - name: Smart Incremental Deployment via rsync
        run: |
          set -e
          echo "--- Syncing modified files incrementally via rsync ---"
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/prod.pem" \
            --rsync-path="sudo rsync" \
            --exclude=".git/" \
            --exclude=".github/" \
            ./ ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:${{ env.DEPLOY_DIR }}/
          echo "--- Incremental sync complete ---"

      - name: Enforce Folder Permissions
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/prod.pem ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'EOF'
            sudo chown -R azureuser:azureuser "${{ env.DEPLOY_DIR }}"
            sudo find "${{ env.DEPLOY_DIR }}" -type d -exec chmod 755 {} +
            sudo find "${{ env.DEPLOY_DIR }}" -type f -exec chmod 644 {} +
          EOF

      - name: Rebuild and Restart via Server Local Docker Compose Only
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/prod.pem ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'EOF'
            set -e
            cd "${{ env.DEPLOY_DIR }}"
            
            echo "🐳 Building Nginx image out of /var/www/html context..."
            sudo docker compose build --no-cache
            
            if [ -n "${{ env.CONTAINER_NAME }}" ]; then
                if sudo docker ps -a --format '{{.Names}}' | grep -Eq "^${{ env.CONTAINER_NAME }}$"; then
                    echo "🚨 Removing colliding instance '${{ env.CONTAINER_NAME }}'..."
                    sudo docker rm -f "${{ env.CONTAINER_NAME }}" 2>/dev/null || true
                fi
            fi
            
            echo "🚀 Launching target containers via Docker Compose..."
            sudo docker compose up -d
            
            echo "Waiting 5 seconds to monitor container stability..."
            sleep 5
            
            CONTAINER_STATE=$(sudo docker inspect -f '{{.State.Running}}' "${{ env.CONTAINER_NAME }}")
            if [ "$CONTAINER_STATE" = "true" ]; then
                echo "✅ Success! Application container is running stable."
                sudo docker compose ps
            else
                echo "❌ CRITICAL FAILURE: Container crashed!"
                exit 1
            fi
          EOF
